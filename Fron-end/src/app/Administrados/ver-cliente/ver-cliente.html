<app-header-admin></app-header-admin>


@if (cliente) {
  <h2>Datos del cliente</h2>

  <p>Nombre: {{ cliente.nombre }}</p>
  <p>Apellido: {{cliente.apellido}}</p>
  <p>Correo Electronico: {{cliente.email}}</p>
  <p>Dirección: {{ cliente.direccion }}</p>
  <p>Teléfono: {{ cliente.contacto }}</p>
}


<div class="vehiculos">

    <div class="titulo">
        <h2>Vehiculos  del cliente</h2>
        <button class="vehiculo" [routerLink]="['/registrarVehiculo']">Agregar vehiculo</button>
    </div>
    
</div>
