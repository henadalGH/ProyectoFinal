<app-header-admin></app-header-admin>

<div class="container-cliente">
  
  @if(cliente){
    <div class="header-cliente">
      <div class="avatar">
        {{cliente.nombre.charAt(0)}}{{cliente.apellido.charAt(0)}}
      </div>

      <h1>Ficha de Cliente</h1>
      <p class="nombre">{{cliente.nombre}} {{cliente.apellido}}</p>
    </div>

    <div class="card-info">
      <div class="campo">
        <h4>Nombre completo</h4>
        <p>{{cliente.nombre}} {{cliente.apellido}}</p>
      </div>
      
      <div class="campo">
        <h4>Email</h4>
        <p>{{cliente.email}}</p>
      </div>
      
      <div class="campo">
        <h4>Teléfono</h4>
        <p>{{cliente.contacto}}</p>
      </div>
      
      <div class="campo">
        <h4>Dirección</h4>
        <p>{{cliente.direccion}}</p>
      </div>
    </div>

    <button  class="btn-vehiculos">
      Ver sus vehiculos
    </button>
  }

</div>
