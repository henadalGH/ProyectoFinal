<app-header-admin></app-header-admin>

<div class="container-cliente">
    <div class="titulo">
        @if(cliente){
            <h1>Ficha de Cliente</h1>
            <p style="text-align: center; color: #fff; font-weight: 600;">
                {{cliente.nombre}} {{cliente.apellido}}
            </p>
        }
    </div>

    @if (cliente) {
        <div class="campo">
            <h4>Nombre y Apellido</h4>
            <p>{{cliente.nombre}} {{cliente.apellido}}</p>
        </div>
        
        <div class="campo">
            <h4>Email Corporativo</h4>
            <p>{{cliente.email}}</p>
        </div>
        
        <div class="campo">
            <h4>Teléfono de Contacto</h4>
            <p>{{cliente.contacto}}</p>
        </div>
        
        <div class="campo" style="border: none;">
            <h4>Dirección de Entrega</h4>
            <p>{{cliente.direccion}}</p>
        </div>
        
        <button class="btn-vehiculos">
            🏎️ Gestionar Vehículos
        </button>
    }
</div>
