<div class="layout">

    <aside class="sidebar">
        <app-header-admin></app-header-admin>
    </aside>

    <main class="content">

        <div class="container">

            <app-header></app-header>

            <div class="titulo">
                <h1>Registrar cliente</h1>
                <p>Complete los datos para crear un nuevo cliente.</p>
            </div>

            <div class="card">

                <div class="card-header">

                    <div>
                        <h2>Nuevo cliente</h2>
                        <p>Ingrese la información del cliente.</p>
                    </div>

                </div>

                <form
                    class="formulario"
                    (ngSubmit)="crearUsuario()">

                    <div class="campo">
                        <label>Nombre</label>
                        <input
                            type="text"
                            name="nombre"
                            [(ngModel)]="nombre"
                            required>
                    </div>

                    <div class="campo">
                        <label>Apellido</label>
                        <input
                            type="text"
                            name="apellido"
                            [(ngModel)]="apellido"
                            required>
                    </div>

                    <div class="campo">
                        <label>Correo electrónico</label>
                        <input
                            type="email"
                            name="email"
                            [(ngModel)]="email"
                            required>
                    </div>

                    <div class="campo">
                        <label>Contraseña</label>
                        <input
                            type="password"
                            name="password"
                            [(ngModel)]="password"
                            required>
                    </div>

                    <div class="campo">
                        <label>Contacto</label>
                        <input
                            type="text"
                            name="contacto"
                            [(ngModel)]="contacto"
                            required>
                    </div>

                    <div class="input-group">
            <label for="provincia">Provincia</label>
            <select
                id="provincia"
                name="provincia"
                [(ngModel)]="provinciaSeleccionada"
                (change)="filtrarLocalidades()">

                <option value="">Seleccione una provincia</option>

                @for (provincia of provincias; track $index) {
                <option [value]="provincia">
                    {{ provincia }}
                </option>
                }
            </select>
            </div>

            <div class="input-group">
            <label for="localidad">Localidad</label>
            <select
                id="localidad"
                name="localidad"
                [(ngModel)]="idLocalidad">

                <option [ngValue]="null">Seleccione una localidad</option>

                @for (loc of localidadesFiltradas; track loc.id) {
                <option [ngValue]="loc.id">
                    {{ loc.nombreLocalidad }}
                </option>
                }
            </select>
            </div>

                    <div class="campo">
                        <label>Domicilio</label>
                        <input
                            type="text"
                            name="direccion"
                            [(ngModel)]="direccion"
                            required>
                    </div>

                    <div class="botones">

                        <button
                            type="submit"
                            class="btn-primary">

                            Registrar cliente

                        </button>

                        <button
                            type="button"
                            class="btn-secondary"
                            [routerLink]="['/gestionCliente']">

                            Cancelar

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </main>

</div>
