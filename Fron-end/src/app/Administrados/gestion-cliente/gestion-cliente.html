<app-header-admin></app-header-admin>

<button [routerLink]="['/registrarCliente']">Agregar Cliente</button>

<h1>Lista de clientes</h1>

@for ( cli of clientes; track $index) {

    <div class="cliente">
        <h3>Nombre: {{cli.usuario.nombre}} {{cli.usuario.apellido}}</h3>
        
        <div class="direccion">
            <h5>Direccion:</h5>
        <p>{{cli.direccion}}</p>
        </div>
        <button>Ver Cliente</button>
    </div>
    
}
