<div class="layout">

    <!-- SIDEBAR -->
  <aside class="sidebar">
    <app-header-admin></app-header-admin>
  </aside>

  <main class="content">

    <div class="contenedor">

        <app-header></app-header>

        <div class="encabezado">

            <div class="titulo">
                <h1>Órdenes listas para facturar</h1>
                <p>Seleccione una orden para consultar los detalles y generar la factura.</p>
            </div>

            <button class="btn-volver">
                <i class="fa-solid fa-arrow-left"></i>
                Volver
            </button>

        </div>


        <div class="lista">

            @for (fac of factura; track $index) {

            <div class="card">

                <div class="estado">
                    PARA FACTURAR
                </div>

                <div class="contenido">

                    <div class="cliente">

                        <div class="icono">
                            <i class="fa-solid fa-user"></i>
                        </div>

                        <div>
                            <span>Cliente</span>
                            <h2>{{fac.nombreCliente}}</h2>
                            
                        </div>

                    </div>


                    <div class="datos">

                        <div class="dato">
                            <i class="fa-solid fa-car"></i>

                            <div>
                                <span>Vehículo</span>
                                <h3>{{fac.marcaVehiculo}}</h3>
                            </div>

                        </div>


                        <div class="dato">
                            <i class="fa-solid fa-id-card"></i>

                            <div>
                                <span>Patente</span>
                                <h3>{{fac.patenteVehiculo}}</h3>
                            </div>

                        </div>

                    </div>

                </div>

                <div class="acciones">
                    <button class="btn-ver" (click)="crearFactura(fac.id)">
                        Cerar factura
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>

            </div>

            }

        </div>

    </div>

  </main>


</div>
