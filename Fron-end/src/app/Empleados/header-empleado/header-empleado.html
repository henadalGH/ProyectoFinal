<header class="header-empleado">
    <div class="brand">
        <h1>W Motor <span>Staff</span></h1>
    </div>

    <nav class="nav-empleado">
        <button class="btn-nav" [routerLink]="['/homeEmpleado']" routerLinkActive="active">
            <i class="fas fa-th-large"></i> <span>Panel Hoy</span>
        </button>

        <button class="btn-nav" [routerLink]="['/misTurnos']" routerLinkActive="active">
            <i class="fas fa-calendar-check"></i> <span>Mis Turnos</span>
        </button>

        <button class="btn-nav" [routerLink]="['/ordenesTrabajo']" routerLinkActive="active">
            <i class="fas fa-tools"></i> <span>Órdenes</span>
        </button>
    </nav>

    <div class="perfil-empleado">
        <div class="info-user">
            <span class="nombre">Operador</span>
            <span class="estado"><i class="fas fa-circle"></i> En línea</span>
        </div>
        <button class="btn-salir" title="Cerrar Sesión">
            <i class="fas fa-power-off"></i>
        </button>
    </div>
</header>
