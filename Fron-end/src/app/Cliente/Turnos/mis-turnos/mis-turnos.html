<div class="layout">
  <aside class="sidebar">
    <!-- menú -->
     <app-headercliente></app-headercliente>
  </aside>

  <main class="content">
    <!-- contenido principal -->
     <app-header></app-header>

     <div class="contenedor-turnos">

  <!-- TITULO -->
  <div class="titulo">
    <h1>Mis turnos</h1>
    <p>Consulta y administra tus turnos pendientes</p>
  </div>

  <!-- SUBTITULO -->
  <div class="subtitulo">
    <h2>Lista de turnos pendientes</h2>
  </div>

  <!-- TURNOS -->
  @for (pen of pendiente; track $index) {

    <div class="turno-card">

      <div class="turno-header">

        <div class="icono-turno">
          <i class="fas fa-calendar-check"></i>
        </div>

        <div class="vehiculo-info">
          <h3>{{pen.marca}} {{pen.modelo}}</h3>
          <span>{{pen.patente}}</span>
        </div>

      </div>

      <div class="turno-body">

        <div class="item">
          <h4>Vehículo</h4>
          <p>{{pen.marca}} {{pen.modelo}}</p>
        </div>

        <div class="item">
          <h4>Patente</h4>
          <p>{{pen.patente}}</p>
        </div>

        <div class="item">
          <h4>Fecha</h4>
          <p>{{pen.fecha}}</p>
        </div>

        <div class="item">
          <h4>Servicio</h4>
          <p>{{pen.nombreServicio}}</p>
        </div>

      </div>

      <div class="botones">

        <button class="btn-aceptar" (click)="confirmarTurno(pen.id)">
          <i class="fas fa-check"></i>
          Aceptar
        </button>

        <button class="btn-cancelar" (click)="cancelarTurno(pen.id)">
          <i class="fas fa-times"></i>
          Cancelar
        </button>

      </div>

    </div>

  }

</div>
  </main>
</div>
