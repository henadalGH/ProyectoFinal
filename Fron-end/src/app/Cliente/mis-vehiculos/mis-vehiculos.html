<app-headercliente></app-headercliente>

<div class="contenedor">
  <div class="header">
    <h1>Mis vehículos</h1>
    <button class="btn-primary" [routerLink]="['/registrarVehiculo']">
      + Agregar vehículo
    </button>
  </div>

  @if (vehiculo.length === 0) {
    <div class="empty">
      <p>No tenés vehículos registrados 🚗</p>
    </div>
  } @else {
    <div class="grid">
      @for (vehi of vehiculo; track $index) {
        <div class="card">
          <div class="card-header">
            <h2>{{ vehi.marca }} {{ vehi.modelo }}</h2>
            <span class="anio">{{ vehi.anio }}</span>
          </div>

          <div class="card-body">
            <p><strong>Patente:</strong> {{ vehi.patente }}</p>
            <p><strong>Kilometraje:</strong> {{ vehi.kilometraje }} km</p>
          </div>

          <div class="card-actions">
            <button class="btn-secondary" (click)="verMiHistorial(vehi.id)">Ver historial</button>
            <button class="btn-primary" (click)="abrirModel(vehi.id)">Solicitar turno</button>
          </div>
        </div>
      

      }
    </div>
  }

  <div class="footer">
    <button class="btn-back" (click)="volverAtras()">⬅ Volver</button>
  </div>

  
</div>

@if (mostrarModal) {
  <div class="modal-overlay">
    <form> <h2>Solicitar Turno</h2>
      
      <div class="campo">
        <label>Seleccione un servicio</label>
        <select name="servicio">
          @for (serv of servicios; track $index) {
            <option value="{{serv.id}}">{{serv.nombre}}</option>
          }
        </select>
      </div>

      <div class="campo">
        <label>Descripción del problema</label>
        <input type="text" placeholder="Ej: Ruido en el motor...">
      </div>

      <div class="btn-aceptar">
        <button type="submit">Solicitar Turno</button>
      </div>
      
      <button type="button" (click)="cerrarModel()">Cerrar</button>
    </form>
  </div>
}
