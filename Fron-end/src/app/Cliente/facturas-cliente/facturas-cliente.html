<div class="layout">

  <!-- ================= MENU LATERAL ================= -->
  <aside class="sidebar">
    <app-headercliente></app-headercliente>
  </aside>

  <!-- ================= CONTENIDO PRINCIPAL ================= -->
  <main class="content">

    <app-header></app-header>
    <div class="facturas-container">

      <!-- ================= TITULO ================= -->
      <section class="titulo">

        <h1>Mis Facturas</h1>
        <p>
          Consulta tus facturas, pagos pendientes y comprobantes.
        </p>
      </section>

      <!-- ================= ULTIMAS FACTURAS ================= -->
      <section class="bloque">

        <h2>Últimas facturas</h2>
        <div class="tabla">
          <!-- CABECERA -->
          <div class="fila cabecera">

            <span>N°</span>
            <span>Fecha</span>
            <span>Monto</span>
            <span>Estado</span>
            <span>Accion</span>


          </div>

          @for (ult of ultimas; track ult.id) {

            <div class="fila">

              <span>
                Factura {{ult.numeroFactura}}
              </span>

              <span>
                {{ult.fechaRegistro}}
              </span>

              <span>
                ${{ult.monto}}
              </span>

              <span
                [class.pagada]="ult.estado != 'ENVIADO'"
                [class.pendiente]="ult.estado == 'ENVIADO'">

                @if (ult.estado == 'ENVIADO') {
                  Impaga
                }
                @else {
                  Pagada
                }
              </span>

              <span>
                <button (click)="verFactura(ult.id)"
                >Ver factura</button>
              </span>

            </div>
          }
        </div>
      </section>
    </div>
  </main>
</div>
